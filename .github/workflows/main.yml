name: Run Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil file
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install library
        run: pip install -r requirements.txt

      - name: Jalankan bot
        run: python botnew.py
        env:
          TOKEN: ${{ secrets.TOKEN }}
